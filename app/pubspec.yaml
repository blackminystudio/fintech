name: fintechapp
description: "The Fintech workspace demo runner."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Core routing, DI, modules, etc.
  core:
    path: ../core

  # Feature packages
  auth:
    path: ../features/auth
  home:
    path: ../features/home

  # UI Kit
  miny_design_system:
    git:
      url: https://github.com/blackminystudio/miny-design-system.git
      ref: main

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
