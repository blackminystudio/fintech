name: fintechapp
description: "The Fintech workspace demo runner."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.3 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  auth:
    path: ../features/auth
  core:
    path: ../core
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_screenutil: ^5.9.3

  home:
    path: ../features/home

  # UI Kit
  miny_design_system:
    git:
      url: https://github.com/blackminystudio/miny-design-system.git
      ref: main

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/native_splash_assets/
