name: Build & upload to Firebase App Distribution 

on:
  push:
    branches:
      - "testbuild"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: 'gradle'
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.0'
        channel: stable
        cache: true

    - name: Set up Melos
      run: dart pub global activate melos

    - name: Add pub-cache to PATH
      run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

    - name: Bootstrap workspace (monorepo)
      run: melos bootstrap

    - name: Compute & persist BUILD_NUMBER from tags 
      run: |
        set -e
        git fetch --tags --force

        # 1) Read SemVer from pubspec.yaml (e.g. "0.2.0+45" -> "0.2.0")
        APP_VERSION=$(sed -n 's/^version:[[:space:]]*//p' app/pubspec.yaml | cut -d'+' -f1)
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

        # 2) Find last counter for THIS version and increment
        LAST=$(git tag -l "SIT-V*-BUILD-*" \
          | sed -E 's/^SIT-V[0-9]+\.[0-9]+\.[0-9]+-BUILD-0*//' \
          | sort -n | tail -1)
        if [ -z "$LAST" ]; then NEXT=1; else NEXT=$((LAST+1)); fi
        PADDED=$(printf "%02d" "$NEXT")

        # 3) Expose build number (must be integer for Android)
        echo "BUILD_NUMBER=$NEXT" | tee -a $GITHUB_ENV

        # 4) Create/push tag and notes
        TAG="SIT-V${APP_VERSION}-BUILD-${PADDED}"
        BRANCH="${GITHUB_REF_NAME}"
        SHA7=$(git rev-parse --short HEAD)
        TAG_MSG="$TAG • $BRANCH • $SHA7"
        echo "TAG=$TAG" >> $GITHUB_ENV
        echo "RELEASE_NOTES=$TAG_MSG" >> $GITHUB_ENV

    # ---- Signing (SIT keystore) ----
    - name: Decode SIT keystore
      run: |
        mkdir -p app/android/app
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/android/app/keystore.jks
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    - name: Write key.properties
      run: |
        mkdir -p app/android
        cat > app/android/key.properties <<EOF
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=keystore.jks
        EOF

    # ---- Build (signed release) ----
    - name: Build APK
      run: melos run apk:build
      env:
        BUILD_NUMBER: ${{ env.BUILD_NUMBER }}

    - name: Verify APK signing & print fingerprints
      run: |
        APK=$(ls app/build/app/outputs/flutter-apk/*release*.apk | head -n1)
        echo "APK: $APK"
        keytool -printcert -jarfile "$APK" | grep -E 'SHA1|SHA-256' || true

    - name: upload artifact to Firebase App Distribution
      uses: emertozd/Firebase-Distribution-Github-Action@v2
      with:
        appId: ${{secrets.FIREBASE_APP_ID}}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_APP_DISTRIBUTION_CREDENTIAL_FILE_CONTENT }}
        groups: qa
        file: app/build/app/outputs/flutter-apk/app-release.apk
        releaseNotes: "$RELEASE_NOTES"

    - name: Create & push tag (only if upload succeeded)
      if: ${{ success() }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$TAG" -m "$RELEASE_NOTES"
        git push origin "$TAG"